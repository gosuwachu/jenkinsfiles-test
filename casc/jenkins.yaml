jenkins:
  systemMessage: ""
  numExecutors: 4
  quietPeriod: 0
  mode: NORMAL

  globalNodeProperties:
    - envVars:
        env:
          - key: DASHBOARD_URL
            value: "http://localhost:3000"

  securityRealm:
    local:
      allowsSignup: false
      users:
        - id: "admin"
          password: "admin"
        - id: "dev2"
          password: "dev2"

  authorizationStrategy:
    projectMatrix:
      entries:
        - user:
            name: "admin"
            permissions:
              - "Overall/Administer"
              - "Overall/Read"
              - "Job/Read"
              - "Job/Build"
              - "Job/Configure"
              - "Job/Delete"
              - "Job/Discover"
              - "Job/Workspace"
              - "Run/Delete"
              - "Run/Replay"
              - "Run/Update"
              - "View/Read"
              - "View/Configure"
              - "View/Create"
              - "View/Delete"
              - "SCM/Tag"
        - group:
            name: "authenticated"
            permissions:
              - "Overall/Read"
              - "Job/Discover"

security:
  globalJobDslSecurityConfiguration:
    useScriptSecurity: false

credentials:
  system:
    domainCredentials:
      - credentials:
          - usernamePassword:
              scope: GLOBAL
              id: "github-pat"
              username: "${GITHUB_USERNAME}"
              password: "${GITHUB_PAT}"
              description: "GitHub PAT for multibranch pipelines"

unclassified:
  globalDefaultFlowDurabilityLevel:
    durabilityHint: PERFORMANCE_OPTIMIZED
  location:
    url: http://localhost:8080/

jobs:
  - script: |
      pipelineJob('seed-job') {
          displayName('Seed Job')
          description('Regenerates all jobs from DSL scripts')
          definition {
              cpsScm {
                  scm {
                      git {
                          remote {
                              url('https://github.com/gosuwachu/jenkins-setup.git')
                              credentials('github-pat')
                          }
                          branches('main')
                      }
                  }
                  scriptPath('jobs/seed.Jenkinsfile')
              }
          }
      }
